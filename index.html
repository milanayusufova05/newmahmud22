<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Makhmud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d49a;
    --dark: #1a1610;
    --mid: #3d3528;
    --text: #2c2416;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* === HERO === */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  .hero-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: sepia(15%) contrast(1.05);
    transform: scale(1.04);
    animation: heroReveal 1.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes heroReveal {
    from { transform: scale(1.12); opacity: 0; }
    to   { transform: scale(1.04); opacity: 1; }
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,8,5,0.0) 30%,
      rgba(10,8,5,0.35) 55%,
      rgba(10,8,5,0.85) 80%,
      rgba(10,8,5,1.0) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px 56px;
    animation: fadeUp 1.4s 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dr-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(10px, 2vw, 13px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .dr-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(52px, 12vw, 96px);
    line-height: 0.9;
    letter-spacing: -0.01em;
    color: var(--cream);
    margin-bottom: 16px;
  }

  .dr-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(16px, 3.5vw, 22px);
    color: var(--gold-light);
    opacity: 0.85;
  }

  /* Gold line separator */
  .sep {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 48px;
    animation: fadeUp 1.4s 0.9s both;
  }

  /* === CARDS SECTION === */
  .cards-section {
    width: 100%;
    max-width: 480px;
    padding: 0 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp 1.4s 1.1s both;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 14px;
    padding: 18px 22px;
    text-decoration: none;
    color: var(--cream);
    backdrop-filter: blur(8px);
    transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
    opacity: 0;
    transition: opacity 0.35s;
  }

  .card:hover {
    border-color: rgba(201,168,76,0.5);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.15);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
  }

  .card-icon.portfolio { background: linear-gradient(135deg, #c9a84c33, #e8d49a22); color: var(--gold); }
  .card-icon.telegram  { background: linear-gradient(135deg, #2AABEE22, #1a8bc433); color: #64c8f5; }
  .card-icon.instagram { background: linear-gradient(135deg, #f0984222, #e1306c22); color: #f09842; }
  .card-icon.whatsapp  { background: linear-gradient(135deg, #25d36622, #1ebe5c22); color: #25d366; }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 3px;
  }

  .card-value {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-arrow {
    color: var(--gold);
    opacity: 0.4;
    font-size: 16px;
    transition: opacity 0.3s, transform 0.3s;
    flex-shrink: 0;
  }

  .card:hover .card-arrow {
    opacity: 0.9;
    transform: translateX(3px);
  }

  /* === FOOTER === */
  .footer {
    padding-bottom: 32px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.3;
    animation: fadeUp 1.4s 1.4s both;
  }
</style>
</head>
